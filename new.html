<!doctype html>

<html lang="en">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap demo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

<div class="container text-centre">

        <h1 class="mb-4">My Hobbies</h1>

        
        <h4>Travelling</h4>
        <div class="progress mb-2">
            <div class="progress-bar" style="width: 99%;">99%</div>
        </div>
        <button class="btn btn-primary mb-4">Travelling</button>

        
        <h4>Baking</h4>
        <div class="progress mb-2">
            <div class="progress-bar bg-success" style="width: 90%;">90%</div>
        </div>
        <button class="btn btn-success mb-4">Baking</button>

        
        <h4>Crafting</h4>
        <div class="progress mb-2">
            <div class="progress-bar bg-warning" style="width: 80%;">80%</div>
        </div>
        <button class="btn btn-warning mb-4">Crafting</button>

    </div>


</body>

</html>
