<!DOCTYPE html>
<html>
<head>
<title>CSS Positioning Example</title>

<style>

body{
    font-family: Arial;
    height: 1200px;
}


.static{
    background-color: lightblue;
    padding: 10px;
}


.relative{
    position: relative;
    left: 30px;
    background-color: lightgreen;
    padding: 10px;
}


.container{
    position: relative;
    height: 150px;
    border: 2px solid black;
    margin-top: 20px;
}

.absolute{
    position: absolute;
    top: 20px;
    right: 20px;
    background-color: pink;
    padding: 10px;
}


.fixed{
    position: fixed;
    bottom: 10px;
    right: 10px;
    background-color: orange;
    padding: 10px;
}

</style>
</head>

<body>

<h2>CSS Positioning Example</h2>

<div class="static">
This is STATIC positioning (default).
</div>

<br>

<div class="relative">
This is RELATIVE positioning (moved slightly).
</div>

<div class="container">
Container Box
<div class="absolute">
This is ABSOLUTE positioning.
</div>
</div>

<div class="fixed">
FIXED Box
</div>

</body>
</html>
