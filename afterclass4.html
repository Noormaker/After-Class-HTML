<!DOCTYPE html>
<html>
<head>
    <title>Text Styling Project</title>
    <style>
        body{
    font-family: Arial;
    background-color: lightblue;
}

h1{
    color: darkblue;
    text-align: center;
}

.intro{
    color: black;
    font-size: 18px;
}

.uppercase{
    text-transform: uppercase;
    color: green;
}

.decorated{
    text-decoration: underline;
    color: red;
}

.center{
    text-align: center;
    font-style: italic;
}
    </style>
</head>

<body>

<h1>My CSS Text Styling</h1>

<p class="intro">This paragraph demonstrates basic text styling in CSS.</p>

<p class="uppercase">This text is transformed to uppercase.</p>

<p class="decorated">This text has decoration.</p>

<p class="center">This text is centered on the page.</p>

</body>
</html>
