<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        input[type="text"]{
            border:2px solid blue;
        }
        input[type="password"]{
            border: 2px solid green;
        }

        ul > li {
            color: green;
            font-size: large;
        }

        h1 + p {
            font-weight: bold;
            color: blueviolet;

            }

            a:hover {
                color: burlywood;
            }

            li:nth-child(2) {
                background-color: yellow;
            }
    </style>

</head>
<body>
    <input type="text" placeholder="Enter Username">
    <input type="password" placeholder="Enter Password">

    <ul>
        <li>First</li>
        <li>Second</li>
    </ul>
    <h1>Sibling Selector</h1>
    <p>This is a sibling selector</p>
    <p>This is a sibling selector</p>

    <a href="#">Hover over me</a>

    <ul>
        <li> Child 1</li>
        <li>Child 2</li>
        <li>Child 3</li>
    </ul>
</body>
</html>
