<!DOCTYPE html>
<html>
<head>
    <title>Simple Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Student Information</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Class</th>
        <th>Marks</th>
    </tr>
    <tr>
        <td>Ali</td>
        <td>8</td>
        <td>85</td>
    </tr>
    <tr>
        <td>Ayesha</td>
        <td>8</td>
        <td>90</td>
    </tr>
    <tr>
        <td>Ahmed</td>
        <td>8</td>
        <td>78</td>
    </tr>
</table>

</body>
</html>
