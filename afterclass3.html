<!DOCTYPE html>
<html>
<head>
    <title>Cascading Effect Project</title>
    
<style>
    
p{
    color: blue;
    font-size: 18px;
}


.text{
    color: green;
}


.special{
    background-color: lightyellow;
}


#title{
    color: red;
    text-align: center;
}


.box{
    background-color: lightgray;
    padding: 15px;
    margin: 20px;
    border: 2px solid black;
}
</style>
</head>

<body>

<h1 id="title">CSS Cascading Example</h1>

<p class="text">This paragraph shows the cascading effect in CSS.</p>

<p class="text special">This paragraph has multiple styles applied.</p>

<div class="box">
    <p>This text is inside a box.</p>
</div>

</body>
</html>
