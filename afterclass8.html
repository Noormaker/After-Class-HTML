<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Unequal Grid</title>


<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
.box{
    background-color: lightblue;
    border: 2px solid blue;
    padding: 20px;
    text-align: center;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">
<h2 class="text-center mt-3">Bootstrap Unequal Grid Example</h2>


<div class="row">
<div class="col-8 box">Column 8</div>
<div class="col-4 box">Column 4</div>
</div>


<div class="row">
<div class="col-3 box">Column 3</div>
<div class="col-6 box">Column 6</div>
<div class="col-3 box">Column 3</div>
</div>

</div>

</body>
</html>
