<!DOCTYPE html>
<html>
<head>
<title>Pseudo Classes Example</title>

<style>

/* Page style */
body{
    font-family: Arial;
    background-color: #f2f2f2;
    text-align: center;
}

/* Button style */
button{
    padding: 10px 20px;
    background-color: blue;
    color: white;
    border: none;
}

button:hover{
    background-color: green;
}


input:focus{
    background-color: lightyellow;
}


li:first-child{
    color: red;
    font-weight: bold;
}

</style>
</head>

<body>

<h2>CSS Pseudo Classes Example</h2>

<h3>Hover Example</h3>
<button>Hover Over Me</button>

<h3>Focus Example</h3>
<input type="text" placeholder="Click here">

<h3>First Child Example</h3>
<ul>
<li>Apple</li>
<li>Banana</li>
<li>Mango</li>
</ul>

</body>
</html>
